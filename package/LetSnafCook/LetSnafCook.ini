; Let Snaf Cook
; Snaf starts with his original Meatbug Ragout reward.
;
; Upgrade1 is active after The Forgotten Recipe unlocks Brock's Stew.
; Upgrade2 is active after Snaf's Syra recipe quest unlocks Syra's Stew.
;
; Each upgrade must contain exactly 3 portions.
; Separators: comma or dot
; Allowed values:
; - meatbug or meat
; - brock
; - syra
;
; Recipes are still gated by quest progress. If a configured portion is not
; unlocked yet, Snaf falls back to the next lower available food:
; syra -> brock -> meatbug
;
; If an upgrade line is invalid, Snaf uses 3x the lower available food for that
; upgrade: Upgrade1 falls back to meatbug, Upgrade2 falls back to brock if
; Brock's quest is done, otherwise meatbug.
;
; Examples:
; Upgrade1=meatbug,brock,brock
; Upgrade2=meatbug,brock,syra
; Upgrade2=brock,brock,syra
; Upgrade2=brock,brock.syra
; Upgrade2=brock,brock,brock

Upgrade1=meatbug,brock,brock
Upgrade2=syra,syra,syra
